{% extends "base.html" %}

{% block title %}Tickets - IT Service Desk{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2><i class="bi bi-ticket-detailed"></i> Service Tickets</h2>
    </div>
    <div class="col text-end">
        <button class="btn btn-success" onclick="checkSLAStatus()">
            <i class="bi bi-clock-history"></i> Check SLA Status
        </button>
        <button class="btn btn-secondary" onclick="refreshTickets()">
            <i class="bi bi-arrow-repeat"></i> Refresh
        </button>
    </div>
</div>

<!-- Filter Section -->
<div class="row mb-3">
    <div class="col-md-3">
        <select id="filterStatus" class="form-control" onchange="applyFilters()">
            <option value="">All Status</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
        </select>
    </div>
    <div class="col-md-3">
        <select id="filterPriority" class="form-control" onchange="applyFilters()">
            <option value="">All Priority</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>
    </div>
    <div class="col-md-3">
        <select id="filterCategory" class="form-control" onchange="applyFilters()">
            <option value="">All Category</option>
            <option value="Network">Network</option>
            <option value="Software">Software</option>
            <option value="Hardware">Hardware</option>
        </select>
    </div>
    <div class="col-md-3">
        <input type="text" id="searchTicket" class="form-control" placeholder="Search by title..." onkeyup="applyFilters()">
    </div>
</div>

<div class="row">
    <div class="col">
        <div class="table-responsive">
            <table class="table table-hover" id="ticketsTable">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>SLA Status</th>
                        <th>Created</th>
                        <th>SLA Deadline</th>
                        <th>Assigned To</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ticketsBody">
                    <tr>
                        <td colspan="10" class="text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Update Ticket Modal -->
<div class="modal fade" id="updateModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Ticket #<span id="updateTicketIdSpan"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="updateTicketId">
                <div class="mb-3">
                    <label>Status</label>
                    <select id="updateStatus" class="form-control">
                        <option value="Open">Open</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Priority</label>
                    <select id="updatePriority" class="form-control">
                        <option value="High">High (4h SLA)</option>
                        <option value="Medium">Medium (24h SLA)</option>
                        <option value="Low">Low (48h SLA)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Assigned To</label>
                    <input type="text" id="updateAssignedTo" class="form-control" placeholder="Team member name">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateTicket()">Update Ticket</button>
            </div>
        </div>
    </div>
</div>

<!-- View Ticket Modal -->
<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Ticket Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="viewTicketContent">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allTickets = [];

async function loadTickets() {
    try {
        const response = await fetch('/api/tickets/');
        allTickets = await response.json();
        applyFilters();
    } catch (error) {
        console.error('Error loading tickets:', error);
        document.getElementById('ticketsBody').innerHTML = `
            <tr><td colspan="10" class="text-center text-danger">
                Error loading tickets. Please refresh the page.
            </td></tr>
        `;
    }
}

function applyFilters() {
    const statusFilter = document.getElementById('filterStatus').value;
    const priorityFilter = document.getElementById('filterPriority').value;
    const categoryFilter = document.getElementById('filterCategory').value;
    const searchTerm = document.getElementById('searchTicket').value.toLowerCase();
    
    let filtered = [...allTickets];
    
    if (statusFilter) {
        filtered = filtered.filter(t => t.status === statusFilter);
    }
    if (priorityFilter) {
        filtered = filtered.filter(t => t.priority === priorityFilter);
    }
    if (categoryFilter) {
        filtered = filtered.filter(t => t.category === categoryFilter);
    }
    if (searchTerm) {
        filtered = filtered.filter(t => t.title.toLowerCase().includes(searchTerm));
    }
    
    displayTickets(filtered);
}

function displayTickets(tickets) {
    const tbody = document.getElementById('ticketsBody');
    
    if (tickets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center">No tickets found</td></tr>';
        return;
    }
    
    tbody.innerHTML = tickets.map(ticket => `
        <tr class="fade-in">
            <td><strong>#${ticket.id}</strong></td>
            <td>${escapeHtml(ticket.title)}</td>
            <td><span class="badge bg-info">${ticket.category}</span></td>
            <td><span class="badge ${getPriorityBadge(ticket.priority)}">${ticket.priority}</span></td>
            <td><span class="badge ${getStatusBadge(ticket.status)}">${ticket.status}</span></td>
            <td><span class="badge ${getSLABadge(ticket.sla_status)}">${ticket.sla_status}</span></td>
            <td><small>${formatDate(ticket.created_at)}</small></td>
            <td><small class="${getDeadlineClass(ticket)}">${formatDate(ticket.sla_deadline)}</small></td>
            <td>${ticket.assigned_to || 'Unassigned'}</td>
            <td>
                <button class="btn btn-sm btn-info" onclick="viewTicket(${ticket.id})" title="View">
                    <i class="bi bi-eye"></i>
                </button>
                <button class="btn btn-sm btn-primary" onclick="openUpdateModal(${ticket.id})" title="Edit">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteTicket(${ticket.id})" title="Delete">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

function getPriorityBadge(priority) {
    const badges = {
        'High': 'bg-danger',
        'Medium': 'bg-warning text-dark',
        'Low': 'bg-success'
    };
    return badges[priority] || 'bg-secondary';
}

function getStatusBadge(status) {
    const badges = {
        'Open': 'bg-danger',
        'In Progress': 'bg-warning text-dark',
        'Resolved': 'bg-success',
        'Closed': 'bg-secondary'
    };
    return badges[status] || 'bg-secondary';
}

function getSLABadge(slaStatus) {
    const badges = {
        'Within SLA': 'bg-success',
        'Near Breach': 'bg-warning text-dark',
        'Breached': 'bg-danger'
    };
    return badges[slaStatus] || 'bg-secondary';
}

function getDeadlineClass(ticket) {
    if (ticket.sla_status === 'Breached') return 'text-danger fw-bold';
    if (ticket.sla_status === 'Near Breach') return 'text-warning fw-bold';
    return 'text-muted';
}

function formatDate(dateString) {
    if (!dateString) return 'N/A';
    const date = new Date(dateString);
    return date.toLocaleString();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function viewTicket(ticketId) {
    try {
        const response = await fetch(`/api/tickets/${ticketId}`);
        const ticket = await response.json();
        
        const content = `
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">${escapeHtml(ticket.title)}</h5>
                    <h6 class="card-subtitle mb-2 text-muted">Ticket #${ticket.id}</h6>
                    <hr>
                    <p><strong>Description:</strong></p>
                    <p>${escapeHtml(ticket.description)}</p>
                    <hr>
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>Category:</strong> ${ticket.category}</p>
                            <p><strong>Priority:</strong> ${ticket.priority}</p>
                            <p><strong>Status:</strong> ${ticket.status}</p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>SLA Status:</strong> ${ticket.sla_status}</p>
                            <p><strong>Created:</strong> ${formatDate(ticket.created_at)}</p>
                            <p><strong>SLA Deadline:</strong> ${formatDate(ticket.sla_deadline)}</p>
                        </div>
                    </div>
                    <hr>
                    <p><strong>Assigned To:</strong> ${ticket.assigned_to || 'Unassigned'}</p>
                    ${ticket.resolved_at ? `<p><strong>Resolved At:</strong> ${formatDate(ticket.resolved_at)}</p>` : ''}
                </div>
            </div>
        `;
        
        document.getElementById('viewTicketContent').innerHTML = content;
        new bootstrap.Modal(document.getElementById('viewModal')).show();
    } catch (error) {
        console.error('Error viewing ticket:', error);
        alert('Error loading ticket details');
    }
}

function openUpdateModal(ticketId) {
    const ticket = allTickets.find(t => t.id === ticketId);
    if (ticket) {
        document.getElementById('updateTicketId').value = ticketId;
        document.getElementById('updateTicketIdSpan').textContent = ticketId;
        document.getElementById('updateStatus').value = ticket.status;
        document.getElementById('updatePriority').value = ticket.priority;
        document.getElementById('updateAssignedTo').value = ticket.assigned_to || '';
        new bootstrap.Modal(document.getElementById('updateModal')).show();
    }
}

async function updateTicket() {
    const ticketId = document.getElementById('updateTicketId').value;
    const data = {
        status: document.getElementById('updateStatus').value,
        priority: document.getElementById('updatePriority').value,
        assigned_to: document.getElementById('updateAssignedTo').value
    };
    
    try {
        const response = await fetch(`/api/tickets/${ticketId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('updateModal')).hide();
            await loadTickets();
            showNotification('Ticket updated successfully', 'success');
        } else {
            const error = await response.json();
            showNotification(`Error: ${error.error}`, 'error');
        }
    } catch (error) {
        console.error('Error updating ticket:', error);
        showNotification('Error updating ticket', 'error');
    }
}

async function deleteTicket(ticketId) {
    if (confirm('Are you sure you want to delete this ticket? This action cannot be undone.')) {
        try {
            const response = await fetch(`/api/tickets/${ticketId}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                await loadTickets();
                showNotification('Ticket deleted successfully', 'success');
            } else {
                showNotification('Error deleting ticket', 'error');
            }
        } catch (error) {
            console.error('Error deleting ticket:', error);
            showNotification('Error deleting ticket', 'error');
        }
    }
}

async function checkSLAStatus() {
    try {
        const response = await fetch('/api/tickets/sla/check');
        const data = await response.json();
        
        if (data.at_risk_tickets && data.at_risk_tickets.length > 0) {
            showNotification(`⚠️ ${data.at_risk_tickets.length} ticket(s) at risk of SLA breach!`, 'warning');
            await loadTickets();
        } else {
            showNotification('✅ All tickets are within SLA limits', 'success');
        }
    } catch (error) {
        console.error('Error checking SLA:', error);
        showNotification('Error checking SLA status', 'error');
    }
}

function refreshTickets() {
    loadTickets();
    showNotification('Refreshing tickets...', 'info');
}

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `alert alert-${type} alert-dismissible fade show position-fixed top-0 end-0 m-3`;
    notification.style.zIndex = '9999';
    notification.style.minWidth = '300px';
    notification.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.remove();
    }, 3000);
}

// Load tickets on page load
document.addEventListener('DOMContentLoaded', loadTickets);
// Refresh every 60 seconds
setInterval(loadTickets, 60000);
</script>
{% endblock %}
