services:
  - type: web
    name: it-service-desk
    runtime: python
    repo: https://github.com/Anwesha-mishra-9090/it-service-desk-sla-analytics.git
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:create_app()
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.7